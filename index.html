---
layout: default
title: Shattered Pixels
---

<div id="home">
   <p class="intro">Sup. This is a blog. <a href="{{ site.baseurl }}/atom.xml">Atom feed.</a></p>
   
   <h2>Posts</h2>
   <ul class="posts">
      {% for post in site.posts %}
      <li>
      	<span>&gt; {{ post.date | date_to_string }}</span> 
      	<a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a>
      </li>
      {% endfor %}
   </ul>
</div>
